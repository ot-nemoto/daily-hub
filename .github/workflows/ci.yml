name: CI

on:
  pull_request:
    branches:
      - develop
      - master
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check if Prisma is used
        id: prisma_check
        run: |
          if [ -f prisma/schema.prisma ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Prisma client
        if: steps.prisma_check.outputs.exists == 'true'
        run: npx prisma generate

      # biome ci は lint とフォーマットを書き換えずに検査する（整形崩れの混入を防ぐ）
      - name: Lint & Format check
        run: npm run ci

      - name: Unit test
        run: npm run test
